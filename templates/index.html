<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨金博客 · 首页</title>
    <link rel="stylesheet" href="/static/css/Blog_css.css">
    <style>
        /* 首页额外样式 */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-spinner::after {
            content: "✧";
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-posts {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-posts a {
            color: var(--gold);
            text-decoration: none;
        }

        .empty-posts a:hover {
            text-decoration: underline;
        }

        .load-more {
            text-align: center;
            margin-top: 40px;
        }

        .load-more-btn {
            background-color: transparent;
            border: 1px solid var(--border-gray);
            color: var(--text-light);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .load-more-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo"><a href="/index">墨金·博</a></div>
            <div class="nav-links">
                <a href="/index" id="nav-home" class="active">首页</a>
                <a href="/pub" id="nav-publish">发布</a>
                <a href="/profile" id="nav-profile">个人主页</a>
                <a href="/login" id="nav-login">登录</a>
            </div>
            <div class="user-tag" id="userDisplay" style="display: none;">
                <span>👤</span> 加载中...
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Hero 大横幅 -->
        <div class="hero">
            <div class="hero-content">
                <div class="hero-badge">✦ 深度思考</div>
                <h1>墨金之间，<br><span class="hero-highlight">洞见</span>未来</h1>
                <p>分享技术、设计与哲学。简洁的文字，深邃的思想。</p>
                <div class="hero-buttons">
                    <button class="btn btn-gold" onclick="window.location.href='/pub'">开始写作</button>
                    <button class="btn btn-outline" onclick="window.location.href='/profile'">我的主页</button>
                </div>
            </div>
            <div class="hero-image">
                <span>✧</span>
            </div>
        </div>

        <!-- 精选文章 -->
        <h2 class="section-title">精选文章</h2>
        <div id="postsGrid" class="featured-grid">
           <div class="loading-spinner">加载中</div>
        </div>

        <!-- 加载更多按钮 -->
        <div id="loadMoreContainer" class="load-more" style="display: none;">
            <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>墨金博客 · 简洁 · 深邃 · 质感</p>
        </div>
    </footer>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
