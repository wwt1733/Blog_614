{% extends "base.html" %}

{% block title %}墨金博客 · 发布文章{% endblock %}

{% block head %}
    <style>
        /* 发布页额外样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-light);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background-color: var(--darker-bg);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .publish-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 30px;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-gray);
            color: var(--text-light);
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-gold {
            background-color: var(--gold);
            color: #1a1a1a;
        }

        .btn-gold:hover {
            background-color: #e6b422;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #51cf66;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(81, 207, 102, 0.1);
            border-radius: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="publish-container">
        <div class="publish-card">
            <h2>发布新文章</h2>
            <div class="login-sub">分享你的思考和见解</div>

            <form id="publishForm">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="title" placeholder="给你的文章起个名字" autocomplete="off">
                    <div class="error-message" id="titleError"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>分类 *</label>
                        <input type="text" id="category" placeholder="设计 / 技术 / 思考" autocomplete="off">
                        <div class="error-message" id="categoryError"></div>
                    </div>

                    <div class="form-group">
                        <label>封面图 (URL)</label>
                        <input type="text" id="picture" placeholder="可选，输入图片链接">
                        <div class="error-message" id="pictureError"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>正文 *</label>
                    <textarea rows="12" id="content" placeholder="写点东西吧……" style="resize: vertical;"></textarea>
                    <div class="error-message" id="contentError"></div>
                </div>

                <div class="success-message" id="successMessage">
                    ✓ 发布成功！正在跳转...
                </div>

                <div class="publish-actions">
                    <button type="button" class="btn btn-outline" id="saveDraftBtn">保存草稿</button>
                    <button type="submit" class="btn btn-gold">发布文章</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
