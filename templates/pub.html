<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨金博客 · 发布文章</title>
    <link rel="stylesheet" href="/static/css/Blog_css.css">
    <style>
        /* 发布页额外样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-light);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background-color: var(--darker-bg);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .publish-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 30px;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-gray);
            color: var(--text-light);
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-gold {
            background-color: var(--gold);
            color: #1a1a1a;
        }

        .btn-gold:hover {
            background-color: #e6b422;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #51cf66;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(81, 207, 102, 0.1);
            border-radius: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo"><a href="/index">墨金·博</a></div>
            <div class="nav-links">
                <a href="/index" id="nav-home">首页</a>
                <a href="/pub" id="nav-publish" class="active">发布</a>
                <a href="/profile" id="nav-profile">个人主页</a>
                <a href="/login" id="nav-login">登录</a>
            </div>
            <div class="user-tag" id="userDisplay" style="display: none;">
                <span>👤</span> 访客
            </div>
        </div>
    </nav>

    <main>
        <div class="publish-container">
            <div class="publish-card">
                <h2>发布新文章</h2>
                <div class="login-sub">分享你的思考和见解</div>

                <form id="publishForm">
                    <!-- 标题 -->
                    <div class="form-group">
                        <label>标题 *</label>
                        <input type="text" id="title" placeholder="给你的文章起个名字" autocomplete="off">
                        <div class="error-message" id="titleError"></div>
                    </div>

                    <div class="form-row">
                        <!-- 分类 -->
                        <div class="form-group">
                            <label>分类 *</label>
                            <input type="text" id="category" placeholder="设计 / 技术 / 思考" autocomplete="off">
                            <div class="error-message" id="categoryError"></div>
                        </div>

                        <!-- 封面图 (URL) -->
                        <div class="form-group">
                            <label>封面图 (URL)</label>
                            <input type="text" id="picture" placeholder="可选，输入图片链接">
                            <div class="error-message" id="pictureError"></div>
                        </div>
                    </div>

                    <!-- 正文 -->
                    <div class="form-group">
                        <label>正文 *</label>
                        <textarea rows="12" id="content" placeholder="写点东西吧……" style="resize: vertical;"></textarea>
                        <div class="error-message" id="contentError"></div>
                    </div>

                    <!-- 提示信息 -->
                    <div class="success-message" id="successMessage">
                        ✓ 发布成功！正在跳转...
                    </div>

                    <div class="publish-actions">
                        <button type="button" class="btn btn-outline" id="saveDraftBtn">保存草稿</button>
                        <button type="submit" class="btn btn-gold">发布文章</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>墨金博客 · 简洁 · 深邃 · 质感</p>
        </div>
    </footer>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
