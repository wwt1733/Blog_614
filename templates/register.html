{% extends "base.html" %}

{% block title %}墨金博客 · 注册{% endblock %}

{% block head %}
    <style>
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--darker-bg);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview .default-avatar {
            font-size: 2.5rem;
            color: var(--gold);
        }

        .upload-btn {
            background-color: var(--darker-bg);
            border: 1px solid var(--border-gray);
            color: var(--text-light);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .upload-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-light);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .input-error {
            border-color: #ff6b6b !important;
        }

        .success-message {
            color: #51cf66;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(81, 207, 102, 0.1);
            border-radius: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .register-note {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-gray);
        }
    </style>
{% endblock %}

{% block content %}
    <div class="login-container">
        <div class="login-card">
            <h2>创建账号</h2>
            <div class="login-sub">加入墨金博客，开始你的创作之旅</div>
            <form id="registerForm">
                <div class="input-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" placeholder="请输入用户名（3-20个字符）" autocomplete="off">
                    <div class="error-message" id="usernameError"></div>
                </div>
                <div class="input-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" placeholder="请输入密码（至少6位）">
                    <div class="error-message" id="passwordError"></div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">确认密码 *</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码">
                    <div class="error-message" id="confirmError"></div>
                </div>
                <div class="input-group">
                    <label>头像（可选）</label>
                    <div class="avatar-upload">
                        <div class="avatar-preview" id="avatarPreview">
                            <div class="default-avatar">✧</div>
                        </div>
                        <div>
                            <button type="button" class="upload-btn" onclick="document.getElementById('avatarInput').click()">📷 选择头像</button>
                            <button type="button" class="upload-btn" onclick="clearAvatar()" style="margin-left: 10px;">✕ 清除</button>
                            <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif">
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">支持 JPG、PNG、GIF，建议 1:1 比例</div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn login-btn">注册新账号</button>
                <div class="success-message" id="successMessage">✓ 注册成功！3秒后跳转到登录页...</div>
                <div class="register-note">已有账号？ <a href="/login" style="color: var(--gold);">返回登录</a></div>
            </form>
        </div>
    </div>
{% endblock %}
