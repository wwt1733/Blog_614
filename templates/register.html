<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨金博客 · 注册</title>
    <link rel="stylesheet" href="/static/css/Blog_css.css">
    <style>
        /* 注册页专属样式 */
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--darker-bg);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview .default-avatar {
            font-size: 2.5rem;
            color: var(--gold);
        }

        .upload-btn {
            background-color: var(--darker-bg);
            border: 1px solid var(--border-gray);
            color: var(--text-light);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .upload-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        #avatarInput {
            display: none;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .input-error {
            border-color: #ff6b6b !important;
        }

        .success-message {
            color: #51cf66;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(81, 207, 102, 0.1);
            border-radius: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .register-note {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-gray);
        }
    </style>
</head>
<body>
    <main>
        <div class="login-container">
            <div class="login-card">
                <h2>创建账号</h2>
                <div class="login-sub">加入墨金博客，开始你的创作之旅</div>

                <!-- 注册表单 -->
                <form id="registerForm">
                    <!-- 用户名 -->
                    <div class="input-group">
                        <label>用户名 *</label>
                        <input type="text" id="username" placeholder="请输入用户名（3-20个字符）" autocomplete="off">
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <!-- 密码 -->
                    <div class="input-group">
                        <label>密码 *</label>
                        <input type="password" id="password" placeholder="请输入密码（至少6位）">
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <!-- 确认密码 -->
                    <div class="input-group">
                        <label>确认密码 *</label>
                        <input type="password" id="confirmPassword" placeholder="请再次输入密码">
                        <div class="error-message" id="confirmError"></div>
                    </div>

                    <!-- 头像上传 -->
                    <div class="input-group">
                        <label>头像（可选）</label>
                        <div class="avatar-upload">
                            <div class="avatar-preview" id="avatarPreview">
                                <div class="default-avatar">✧</div>
                            </div>
                            <div>
                                <button type="button" class="upload-btn" onclick="document.getElementById('avatarInput').click()">
                                    📷 选择头像
                                </button>
                                <button type="button" class="upload-btn" onclick="clearAvatar()" style="margin-left: 10px;">
                                    ✕ 清除
                                </button>
                                <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif">
                                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
                                    支持 JPG、PNG、GIF，建议 1:1 比例
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <button type="submit" class="btn login-btn">注册新账号</button>

                    <!-- 提示信息 -->
                    <div class="success-message" id="successMessage">
                        ✓ 注册成功！3秒后跳转到登录页...
                    </div>

                    <div class="register-note">
                        已有账号？ <a href="/login" style="color: var(--gold);">返回登录</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>墨金博客 · 简洁 · 深邃 · 质感</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    <script>
        // 获取DOM元素
        const form = document.getElementById('registerForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');

        // 错误提示元素
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');

        // 成功提示
        const successMessage = document.getElementById('successMessage');

        let selectedAvatar = null; // 存储base64格式的头像

        // 头像上传预览
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 验证文件类型
                if (!file.type.match('image/jpeg') && !file.type.match('image/png') && !file.type.match('image/gif')) {
                    alert('只支持 JPG、PNG、GIF 格式的图片');
                    avatarInput.value = '';
                    return;
                }

                // 验证文件大小（限制2MB）
                if (file.size > 2 * 1024 * 1024) {
                    alert('图片大小不能超过 2MB');
                    avatarInput.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedAvatar = e.target.result;
                    avatarPreview.innerHTML = `<img src="${selectedAvatar}" alt="头像">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 清除头像
        function clearAvatar() {
            selectedAvatar = null;
            avatarInput.value = '';
            avatarPreview.innerHTML = '<div class="default-avatar">✧</div>';
        }

        // 清除所有错误提示
        function clearErrors() {
            const errors = [usernameError, passwordError, confirmError];
            errors.forEach(error => {
                error.classList.remove('show');
                error.textContent = '';
            });

            const inputs = [usernameInput, passwordInput, confirmInput];
            inputs.forEach(input => {
                input.classList.remove('input-error');
            });
        }

        // 显示错误信息
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
            // 为对应的输入框添加错误样式
            if (element === usernameError) usernameInput.classList.add('input-error');
            if (element === passwordError) passwordInput.classList.add('input-error');
            if (element === confirmError) confirmInput.classList.add('input-error');
        }

        // 验证表单
        function validateForm() {
            let isValid = true;
            clearErrors();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            // 验证用户名
            if (!username) {
                showError(usernameError, '请输入用户名');
                isValid = false;
            } else if (username.length < 3 || username.length > 20) {
                showError(usernameError, '用户名长度必须在3-20个字符之间');
                isValid = false;
            } else if (!/^[a-zA-Z0-9\u4e00-\u9fa5_]+$/.test(username)) {
                showError(usernameError, '用户名只能包含字母、数字、中文和下划线');
                isValid = false;
            }

            // 验证密码
            if (!password) {
                showError(passwordError, '请输入密码');
                isValid = false;
            } else if (password.length < 6) {
                showError(passwordError, '密码长度至少为6位');
                isValid = false;
            }

            // 验证确认密码
            if (!confirm) {
                showError(confirmError, '请确认密码');
                isValid = false;
            } else if (password !== confirm) {
                showError(confirmError, '两次输入的密码不一致');
                isValid = false;
            }

            return isValid;
        }




        // 注册用户 - 调用后端API
        async function registerUser(username, password, avatar) {
            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                if (avatar) {
                    formData.append('avatar', avatar);
                }

                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('注册失败:', error);
                return { result: false, msg: '网络错误，请稍后重试' };
            }
        }

        // 处理表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // 禁用提交按钮
            const submitBtn = form.querySelector('.login-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            // 调用后端API注册
            const result = await registerUser(username, password, selectedAvatar);

            if (result.result) {
                // 显示成功消息
                successMessage.classList.add('show');
                submitBtn.textContent = '注册成功，正在跳转...';

                // 2秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = '/login?registered=true';
                }, 2000);
            } else {
                // 显示错误信息
                showError(usernameError, result.msg || '注册失败，请重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册新账号';
            }
        });

        // 实时清除输入框的错误样式
        usernameInput.addEventListener('input', function() {
            if (usernameInput.classList.contains('input-error')) {
                usernameInput.classList.remove('input-error');
                usernameError.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', function() {
            if (passwordInput.classList.contains('input-error')) {
                passwordInput.classList.remove('input-error');
                passwordError.classList.remove('show');
            }
            // 如果密码改变，也要清除确认密码的错误
            if (confirmInput.classList.contains('input-error')) {
                confirmInput.classList.remove('input-error');
                confirmError.classList.remove('show');
            }
        });

        confirmInput.addEventListener('input', function() {
            if (confirmInput.classList.contains('input-error')) {
                confirmInput.classList.remove('input-error');
                confirmError.classList.remove('show');
            }
        });
    </script>
</body>
</html>
