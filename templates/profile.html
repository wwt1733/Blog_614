{% extends "base.html" %}

{% block title %}墨金博客 · 个人主页{% endblock %}

{% block head %}
    <style>
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-header {
            background-color: var(--darker-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
            border: 1px solid var(--border-gray);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--gold);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        .profile-bio {
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gold);
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .my-posts {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-item {
            background-color: var(--darker-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border-gray);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .post-item:hover {
            transform: translateX(3px);
            border-color: var(--gold);
        }

        .post-info h4 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .edit-btn, .delete-btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .edit-btn {
            background-color: var(--gold);
            color: #1a1a1a;
        }

        .delete-btn {
            background-color: transparent;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .empty-posts {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            width: min(760px, 100%);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .modal-form-group input,
        .modal-form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--darker-bg);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-light);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .post-item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
{% endblock %}

{% block content %}
    <div class="container profile-container">
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">✧</div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">墨客 · 博主</div>
                <div class="profile-bio">设计 & 代码爱好者，专注深色界面与质感细节。墨金博客主理人。</div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="postCount">0</span>
                        <span class="stat-label">文章</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="postsContainer">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑文章</h3>
                <button class="close-modal" onclick="closeEditModal()">✕</button>
            </div>
            <form id="editForm">
                <div class="modal-form-group">
                    <label for="editTitle">标题 *</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="modal-form-group">
                    <label for="editCategory">分类</label>
                    <input type="text" id="editCategory" placeholder="设计 / 技术 / 思考">
                </div>
                <div class="modal-form-group">
                    <label for="editContent">正文 *</label>
                    <textarea id="editContent" rows="10" required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="delete-btn" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="edit-btn">保存修改</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
