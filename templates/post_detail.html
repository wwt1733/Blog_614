{% extends "base.html" %}

{% block title %}墨金博客 · 文章详情{% endblock %}

{% block head %}
    <style>
        /* 文章详情页样式 */
        .article-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .article-card {
            background-color: var(--darker-bg);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid var(--border-gray);
        }

        .article-header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 20px;
        }

        .article-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-light);
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-category {
            background-color: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .article-content p {
            margin-bottom: 1.5em;
        }

        .article-content h2,
        .article-content h3 {
            margin-top: 2em;
            margin-bottom: 1em;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        .article-content blockquote {
            border-left: 3px solid var(--gold);
            padding-left: 20px;
            margin: 20px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .article-content code {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .article-content pre {
            background-color: #1a1a1a;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .article-content pre code {
            background: none;
            padding: 0;
        }

        .article-footer {
            border-top: 1px solid var(--border-gray);
            padding-top: 30px;
            margin-top: 20px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--card-bg);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--gold);
            overflow: hidden;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-details {
            flex: 1;
        }

        .author-name {
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .author-bio {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .article-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .action-btn.edit {
            background-color: var(--gold);
            color: #1a1a1a;
        }

        .action-btn.edit:hover {
            background-color: #e6b422;
        }

        .action-btn.delete {
            background-color: transparent;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .action-btn.delete:hover {
            background-color: #ff6b6b;
            color: white;
        }

        .action-btn.back {
            background-color: transparent;
            border: 1px solid var(--border-gray);
            color: var(--text-light);
        }

        .action-btn.back:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-container h2 {
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .error-container p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .article-card {
                padding: 20px;
            }

            .article-title {
                font-size: 1.8rem;
            }

            .article-content {
                font-size: 1rem;
            }
        }

        .loading-article {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .loading-article::after {
            content: "✧";
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
{% endblock %}

{% block content %}
    <div id="articleContainer" class="article-container">
        <div class="loading-article">加载文章</div>
    </div>
{% endblock %}
